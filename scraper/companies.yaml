# Companies to scrape, grouped by tier.
# Each company has:
#   adapter: which scraper adapter to use
#   slug/url/board_id: adapter-specific identifier
#   tier: S+, S, A+, A, B (used for sorting/visual cue)
#
# Adapter types currently supported:
#   greenhouse        -> https://boards-api.greenhouse.io/v1/boards/{slug}/jobs
#   lever             -> https://api.lever.co/v0/postings/{slug}?mode=json
#   ashby             -> https://api.ashbyhq.com/posting-api/job-board/{slug}
#   smartrecruiters   -> https://api.smartrecruiters.com/v1/companies/{slug}/postings
#   workday           -> {host}/wday/cxs/{tenant}/{site}/jobs (POST)
#   custom_playwright -> dedicated module under adapters/custom/<slug>.py

